<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --background:#09090b; --card:#0c0c0f; --card-inner:#101014;
    --border:#1f1f23; --border-soft:#27272a; --foreground:#fafafa;
    --muted:#a1a1aa; --muted-2:#71717a; --primary:#fafafa; --primary-fg:#09090b;
    --chip:#0e0e11; --radius:14px;
  }
  [data-theme="light"]{
    --background:#f4f4f5; --card:#ffffff; --card-inner:#fafafa;
    --border:#e4e4e7; --border-soft:#e4e4e7; --foreground:#09090b;
    --muted:#52525b; --muted-2:#71717a; --primary:#18181b; --primary-fg:#fafafa; --chip:#fafafa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--background);color:var(--foreground);font-family:'Inter',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
  .container{max-width:680px;margin:0 auto;padding:28px 16px 64px}

  .theme-toggle{position:absolute;top:0;right:0;width:52px;height:28px;border-radius:100px;background:var(--card-inner);border:1px solid var(--border-soft);cursor:pointer;display:flex;align-items:center;padding:3px;transition:.25s}
  .theme-toggle .knob{width:20px;height:20px;border-radius:50%;background:var(--foreground);margin-left:auto;display:grid;place-items:center;transition:.25s;font-size:11px;color:var(--background)}
  [data-theme="light"] .theme-toggle .knob{margin-left:0}
  .header{position:relative;text-align:center;padding-top:8px;margin-bottom:32px}
  .avatar{width:148px;height:148px;border-radius:24px;margin:0 auto 22px;background:linear-gradient(150deg,#be185d,#7e22ce 70%);display:grid;place-items:center;font-size:54px;font-weight:800;color:#fff;box-shadow:0 12px 40px -12px rgba(190,24,93,.5);overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .name{font-size:30px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;justify-content:center;gap:8px}
  .verified{color:#3b82f6;font-size:22px}
  .loc{color:var(--muted);font-size:15px;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px}
  .role{font-size:17px;margin-top:10px;font-weight:500}
  .cta-stack{display:flex;flex-direction:column;gap:10px;margin-top:22px}
  .btn{width:100%;border-radius:10px;padding:13px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;text-decoration:none;border:1px solid transparent;transition:.18s}
  .btn-primary{background:var(--primary);color:var(--primary-fg)}
  .btn-primary:hover{opacity:.9}
  .btn-outline{background:transparent;color:var(--foreground);border-color:var(--border-soft)}
  .btn-outline:hover{background:var(--card-inner)}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px 24px;margin-top:18px}
  .card-title{display:flex;align-items:center;gap:11px;font-size:20px;font-weight:700;margin-bottom:18px}
  .card-title svg{width:20px;height:20px;stroke:var(--foreground);stroke-width:2;fill:none}
  .card p{color:var(--foreground);font-size:15.5px}
  .card p + p{margin-top:14px}

  .stack-group{margin-bottom:24px}
  .stack-group:last-child{margin-bottom:0}
  .stack-group h4{font-size:16px;font-weight:700;margin-bottom:12px}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{font-size:14px;font-weight:500;padding:7px 15px;border-radius:100px;background:var(--chip);border:1px solid var(--border-soft);color:var(--foreground);transition:.15s}
  .chip:hover{border-color:var(--muted-2);transform:translateY(-1px)}

  .timeline{position:relative;padding-left:34px}
  .timeline::before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:var(--border-soft)}
  .tl-item{position:relative;padding-bottom:30px}
  .tl-item:last-child{padding-bottom:0}
  .tl-item::before{content:"";position:absolute;left:-34px;top:4px;width:16px;height:16px;border-radius:50%;background:var(--foreground);border:3px solid var(--background);box-shadow:0 0 0 2px var(--border-soft)}
  .tl-date{font-size:13px;color:var(--muted-2);font-weight:500}
  .tl-role{font-size:18px;font-weight:700;margin-top:2px}
  .tl-org{font-size:15px;color:var(--muted);margin-top:1px}
  .tl-desc{font-size:14.5px;color:var(--muted);margin-top:8px}

  .proj{background:var(--card-inner);border:1px solid var(--border-soft);border-radius:12px;padding:20px;margin-top:14px;transition:.18s}
  .proj:first-of-type{margin-top:0}
  .proj:hover{border-color:var(--muted-2);transform:translateY(-2px)}
  .proj-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .proj h3{font-size:18px;font-weight:700}
  .proj-tier{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:100px;border:1px solid;white-space:nowrap}
  .tier-def{color:#34d399;border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.08)}
  .tier-off{color:#fbbf24;border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.08)}
  .tier-gen{color:#60a5fa;border-color:rgba(96,165,250,.35);background:rgba(96,165,250,.08)}
  .proj p{font-size:14.5px;color:var(--muted);margin-top:8px}
  .group-label{font-size:13px;font-weight:600;color:var(--muted-2);text-transform:uppercase;letter-spacing:1px;margin:24px 0 4px}
  .group-label:first-child{margin-top:0}

  /* project filters */
  .filter-label{font-size:12px;font-weight:600;color:var(--muted-2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .filter{font-size:13px;font-weight:500;padding:7px 14px;border-radius:100px;background:var(--chip);border:1px solid var(--border-soft);color:var(--muted);cursor:pointer;transition:.15s;user-select:none}
  .filter:hover{color:var(--foreground)}
  .filter.active{background:var(--card-inner);color:var(--foreground);border-color:var(--muted-2)}
  .filter .d{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .d-def{background:#34d399}.d-off{background:#fbbf24}.d-gen{background:#60a5fa}.d-pur{background:#a78bfa}

  /* project meta row: tier + status + category */
  .proj-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:10px}
  .pill{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:100px;border:1px solid;white-space:nowrap}
  .cat-def{color:#34d399;border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.08)}
  .cat-off{color:#fbbf24;border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.08)}
  .cat-gen{color:#60a5fa;border-color:rgba(96,165,250,.35);background:rgba(96,165,250,.08)}
  .cat-pur{color:#a78bfa;border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.08)}
  .tier-easy{color:#4ade80;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.06)}
  .tier-med{color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)}
  .tier-hard{color:#f87171;border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.06)}
  .st{font-size:11px;font-weight:600;color:var(--muted-2);display:inline-flex;align-items:center;gap:5px}
  .st .led{width:7px;height:7px;border-radius:50%;display:inline-block}
  .st-prog .led{background:#fbbf24;box-shadow:0 0 6px #fbbf24}
  .st-prog{color:#fbbf24}
  .st-done .led{background:#34d399;box-shadow:0 0 6px #34d399}
  .st-done{color:#34d399}
  .st-plan .led{background:var(--muted-2)}
  .proj-tools{font-size:12.5px;color:var(--muted-2);margin-top:10px}

  /* certifications */
  .cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .cert{display:block;text-decoration:none;color:inherit;background:var(--card-inner);border:1px solid var(--border-soft);border-radius:11px;padding:16px;transition:.15s}
  .cert:hover{border-color:var(--muted-2);transform:translateY(-2px)}
  .cert .cstatus{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px;margin-bottom:7px}
  .cert .cstatus .led{width:7px;height:7px;border-radius:50%}
  .c-prog{color:#fbbf24}.c-prog .led{background:#fbbf24;box-shadow:0 0 6px #fbbf24}
  .c-done{color:#34d399}.c-done .led{background:#34d399;box-shadow:0 0 6px #34d399}
  .c-plan{color:var(--muted-2)}.c-plan .led{background:var(--muted-2)}
  .c-goal{color:#a78bfa}.c-goal .led{background:#a78bfa;box-shadow:0 0 6px #a78bfa}
  .cert .cname{font-size:15px;font-weight:700}
  .cert .cnote{font-size:12.5px;color:var(--muted);margin-top:3px}
  @media(max-width:520px){.cert-grid{grid-template-columns:1fr}}

  /* learning journey */
  .journey{display:flex;flex-direction:column;gap:0;position:relative}
  .jstage{display:flex;gap:16px;padding-bottom:24px;position:relative}
  .jstage:last-child{padding-bottom:0}
  .jstage::before{content:"";position:absolute;left:17px;top:38px;bottom:0;width:2px;background:var(--border-soft)}
  .jstage:last-child::before{display:none}
  .jnum{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:var(--card-inner);border:1px solid var(--border-soft);display:grid;place-items:center;font-weight:700;font-size:15px;color:var(--foreground);position:relative;z-index:1}
  .jbody{padding-top:4px}
  .jtitle{font-size:16.5px;font-weight:700}
  .jdesc{font-size:14px;color:var(--muted);margin-top:5px}
  .jtags{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
  .jtags span{font-size:12px;font-weight:500;padding:4px 11px;border-radius:100px;background:var(--chip);border:1px solid var(--border-soft);color:var(--muted)}

  .social-link{display:flex;align-items:center;gap:13px;padding:14px 18px;border-radius:11px;border:1px solid var(--border-soft);background:var(--card-inner);text-decoration:none;color:var(--foreground);font-weight:500;font-size:15px;margin-top:12px;transition:.15s}
  .social-link:first-of-type{margin-top:0}
  .social-link:hover{border-color:var(--muted-2);background:var(--card)}
  .social-link svg{width:20px;height:20px;fill:currentColor}

  .featured{background:linear-gradient(160deg,rgba(126,34,206,.14),rgba(190,24,93,.08) 60%,transparent);border:1px solid var(--border-soft);border-radius:12px;padding:24px;position:relative;overflow:hidden}
  .featured::before{content:"";position:absolute;inset:0;border-radius:12px;padding:1px;background:linear-gradient(160deg,rgba(190,24,93,.5),rgba(126,34,206,.3),transparent);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
  .featured-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#f9a8d4;background:rgba(190,24,93,.15);border:1px solid rgba(190,24,93,.35);padding:4px 11px;border-radius:100px;margin-bottom:14px}
  .featured h3{font-size:22px;font-weight:800;letter-spacing:-.3px}
  .featured .sub{font-size:14px;color:var(--muted-2);margin-top:2px;margin-bottom:12px}
  .featured p{font-size:15px;color:var(--muted)}
  .featured .role-line{margin-top:14px;font-size:14px;color:var(--foreground);display:flex;align-items:center;gap:8px}
  .featured .role-line svg{width:16px;height:16px;stroke:#f9a8d4;fill:none;stroke-width:2;flex-shrink:0}
  .featured .chips{margin-top:16px}
  .difficulty{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 11px;border-radius:100px;border:1px solid;margin-left:8px;vertical-align:middle}
  .diff-hard{color:#f87171;border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.1)}
  .featured-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .featured-actions a{flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:9px;font-size:14px;font-weight:600;text-decoration:none;transition:.18s}
  .featured-actions svg{width:17px;height:17px;flex-shrink:0}
  .btn-demo{background:var(--primary);color:var(--primary-fg)}
  .btn-demo:hover{opacity:.9}
  .btn-demo svg{stroke:var(--primary-fg);fill:none;stroke-width:2}
  .btn-repo{background:transparent;color:var(--foreground);border:1px solid var(--border-soft)}
  .btn-repo:hover{background:var(--card)}
  .btn-repo svg{fill:currentColor}
  footer{text-align:center;color:var(--muted-2);font-size:14px;margin-top:36px;padding-top:24px;border-top:1px solid var(--border)}
</style>
</head>
